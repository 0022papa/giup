<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거시경제 대시보드 - giup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 기본 스타일 초기화 및 배경색 설정 */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f4f4; 
        }
        
        /* 상단 헤더 영역 스타일 */
        .header-section { 
            margin-bottom: 40px; 
        }
        h1 { color: #007acc; margin-bottom: 10px; }
        .description { color: #555; margin-bottom: 20px; }
        
        /* 로그아웃 버튼 스타일 */
        .logout-btn {
            display: inline-block; 
            padding: 8px 16px; 
            background-color: #333; 
            color: white;
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 14px; 
            transition: background-color 0.3s;
        }
        .logout-btn:hover { background-color: #555; }

        /* 거시경제 대시보드 그리드 레이아웃 */
        .dashboard-container {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px;
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        /* 개별 위젯 카드 스타일 */
        .widget-card {
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 300px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        /* 지표 제목 라벨 */
        .widget-title {
            font-size: 15px; 
            font-weight: bold; 
            color: #333; 
            padding: 12px 0;
            background-color: #fff; 
            border-bottom: 1px solid #eee; 
            margin: 0; 
            z-index: 10;
        }
        
        /* 차트가 그려질 컨테이너 영역 */
        .chart-container {
            flex-grow: 1; 
            padding: 10px; 
            position: relative; 
            width: 100%; 
            box-sizing: border-box;
        }

        /* 데이터 로딩 표시 텍스트 스타일 */
        .loading-text {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            color: #888; 
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>거시경제 모니터링 대시보드 (자체 데이터 수집)</h1>
        <p class="description">Docker 환경의 data 폴더에 저장된 파일 기반 실시간 지표 대시보드입니다.</p>
        <a href="/logout" class="logout-btn">로그아웃</a>
    </div>

    <div class="dashboard-container">
        
        <div class="widget-card">
            <p class="widget-title">원/달러 환율 (USD/KRW)</p>
            <div class="chart-container">
                <div class="loading-text" id="load-usdkrw">데이터 불러오는 중...</div>
                <canvas id="chart-usdkrw"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">미국 10년물 국채 금리</p>
            <div class="chart-container">
                <div class="loading-text" id="load-us10y">데이터 불러오는 중...</div>
                <canvas id="chart-us10y"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">WTI 국제유가</p>
            <div class="chart-container">
                <div class="loading-text" id="load-wti">데이터 불러오는 중...</div>
                <canvas id="chart-wti"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">나스닥 100</p>
            <div class="chart-container">
                <div class="loading-text" id="load-ndx">데이터 불러오는 중...</div>
                <canvas id="chart-ndx"></canvas>
            </div>
        </div>
        
        <div class="widget-card">
            <p class="widget-title">코스피 (KOSPI)</p>
            <div class="chart-container">
                <div class="loading-text" id="load-kospi">데이터 불러오는 중...</div>
                <canvas id="chart-kospi"></canvas>
            </div>
        </div>
        
         <div class="widget-card">
            <p class="widget-title">VIX 공포지수</p>
            <div class="chart-container">
                <div class="loading-text" id="load-vix">데이터 불러오는 중...</div>
                <canvas id="chart-vix"></canvas>
            </div>
        </div>

    </div>

    <script>
        // 서버의 /api/macro 엔드포인트를 호출하여 JSON 데이터를 받아오는 함수
        async function fetchAndRenderCharts() {
            try {
                const response = await fetch('/api/macro');
                const data = await response.json();
                
                if (data.error) {
                    alert("데이터 수집 중 오류 발생: " + data.error);
                    return;
                }

                /**
                 * 개별 차트를 그리는 공통 모듈 함수
                 * @param {string} canvasId - 캔버스 엘리먼트 ID
                 * @param {string} loadingId - 로딩 텍스트 엘리먼트 ID
                 * @param {Array} chartData - {date, close} 구조의 배열 데이터
                 * @param {string} lineColor - 차트 선 색상
                 * @param {string} fillColor - 차트 하단 영역 채우기 색상
                 */
                function drawChart(canvasId, loadingId, chartData, lineColor, fillColor) {
                    // 데이터 로드가 완료되면 로딩 가이드를 숨깁니다.
                    document.getElementById(loadingId).style.display = 'none';
                    
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chartData.map(d => d.date), // X축: 날짜 배열
                            datasets: [{
                                data: chartData.map(d => d.close), // Y축: 종가 배열
                                borderColor: lineColor,
                                backgroundColor: fillColor,
                                borderWidth: 2,
                                fill: true,
                                pointRadius: 0, // 위젯 느낌을 내기 위해 선 위의 점 숨김
                                tension: 0.1 // 부드러운 곡선 효과
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false } // 범례 비활성화
                            },
                            scales: {
                                x: { display: false }, // X축 선 및 라벨 숨김 (깔끔한 대시보드용)
                                y: { 
                                    display: true,
                                    position: 'right', // 수치를 우측에 배치하여 가독성 향상
                                    grid: { color: '#f0f0f0' } // 은은한 그리드 라인 배경
                                }
                            },
                            interaction: {
                                intersect: false,
                                mode: 'index',
                            }
                        }
                    });
                }

                // 6가지 거시경제 지표 차트 순차적 렌더링 (시각적 구분을 위한 고유 컬러 지정)
                drawChart('chart-usdkrw', 'load-usdkrw', data.usdkrw, '#2962FF', 'rgba(41, 98, 255, 0.1)');
                drawChart('chart-us10y', 'load-us10y', data.us10y, '#FF9800', 'rgba(255, 152, 0, 0.1)');
                drawChart('chart-wti', 'load-wti', data.wti, '#00897B', 'rgba(0, 137, 123, 0.1)');
                drawChart('chart-ndx', 'load-ndx', data.ndx, '#D81B60', 'rgba(216, 27, 96, 0.1)');
                drawChart('chart-kospi', 'load-kospi', data.kospi, '#8E24AA', 'rgba(142, 36, 170, 0.1)');
                drawChart('chart-vix', 'load-vix', data.vix, '#E53935', 'rgba(229, 57, 53, 0.1)');

            } catch (error) {
                console.error("대시보드 데이터 로딩 실패:", error);
            }
        }

        // 브라우저 화면이 완전히 로드되면 실시간 데이터 갱신 파이프라인 작동
        window.onload = fetchAndRenderCharts;
    </script>
</body>
</html>
