<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거시경제 대시보드 - giup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header-section { margin-bottom: 40px; }
        h1 { color: #007acc; margin-bottom: 10px; }
        .description { color: #555; margin-bottom: 20px; }
        .logout-btn { display: inline-block; padding: 8px 16px; background-color: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; transition: background-color 0.3s; }
        .logout-btn:hover { background-color: #555; }
        .dashboard-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .widget-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: 340px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .widget-title { font-size: 14px; font-weight: bold; color: #666; padding: 12px 20px 5px 20px; text-align: left; margin: 0; z-index: 10; }
        .price-container { text-align: left; padding: 0 20px; margin-bottom: 10px; display: flex; align-items: baseline; }
        .current-price { font-size: 24px; font-weight: bold; color: #1e1e1e; margin-right: 10px; }
        .price-change { font-size: 14px; font-weight: bold; }
        .price-change.up { color: #d32f2f; }
        .price-change.down { color: #1565c0; }
        .price-change.steady { color: #767676; }
        .chart-container { flex-grow: 1; padding: 0 10px 10px 10px; position: relative; width: 100%; box-sizing: border-box; }
        .loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>거시경제 모니터링 대시보드 (자체 데이터 수집)</h1>
        <p class="description">Docker 환경의 data 폴더에 저장된 파일 기반 실시간 지표 대시보드입니다.</p>
        <a href="/logout" class="logout-btn">로그아웃</a>
    </div>

    <div class="dashboard-container">
        
        <div class="widget-card">
            <p class="widget-title">원/달러 환율 (USD/KRW)</p>
            <div class="price-container">
                <span class="current-price" id="price-usdkrw">-</span>
                <span class="price-change" id="change-usdkrw">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-usdkrw">데이터 불러오는 중...</div>
                <canvas id="chart-usdkrw"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">미국 10년물 국채 금리</p>
            <div class="price-container">
                <span class="current-price" id="price-us10y">-</span>
                <span class="price-change" id="change-us10y">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-us10y">데이터 불러오는 중...</div>
                <canvas id="chart-us10y"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">WTI 국제유가</p>
            <div class="price-container">
                <span class="current-price" id="price-wti">-</span>
                <span class="price-change" id="change-wti">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-wti">데이터 불러오는 중...</div>
                <canvas id="chart-wti"></canvas>
            </div>
        </div>

        <div class="widget-card">
            <p class="widget-title">나스닥 100</p>
            <div class="price-container">
                <span class="current-price" id="price-ndx">-</span>
                <span class="price-change" id="change-ndx">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-ndx">데이터 불러오는 중...</div>
                <canvas id="chart-ndx"></canvas>
            </div>
        </div>
        
        <div class="widget-card">
            <p class="widget-title">코스피 (KOSPI)</p>
            <div class="price-container">
                <span class="current-price" id="price-kospi">-</span>
                <span class="price-change" id="change-kospi">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-kospi">데이터 불러오는 중...</div>
                <canvas id="chart-kospi"></canvas>
            </div>
        </div>
        
         <div class="widget-card">
            <p class="widget-title">VIX 공포지수</p>
            <div class="price-container">
                <span class="current-price" id="price-vix">-</span>
                <span class="price-change" id="change-vix">-</span>
            </div>
            <div class="chart-container">
                <div class="loading-text" id="load-vix">데이터 불러오는 중...</div>
                <canvas id="chart-vix"></canvas>
            </div>
        </div>

    </div>

    <script>
        const chartInstances = {};

        // [수정] 서버 호출 시 isForce 파라미터를 받아와 처리하도록 변경
        async function fetchAndRenderCharts(isForce = false) {
            try {
                // 강제 갱신 요청인 경우 쿼리스트링 부착
                const url = isForce ? '/api/macro?force=true' : '/api/macro';
                
                // 새로고침 시 사용자에게 화면에서 데이터 갱신 중임을 안내합니다.
                if (isForce) {
                    const widgets = ['usdkrw', 'us10y', 'wti', 'ndx', 'kospi', 'vix'];
                    widgets.forEach(id => {
                        const loadEl = document.getElementById(`load-${id}`);
                        if (loadEl && !chartInstances[`chart-${id}`]) {
                            loadEl.innerText = "일괄 최신화 진행 중... (최대 10초 대기)";
                            loadEl.style.display = 'block';
                        }
                    });
                }

                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    console.warn("데이터를 기다리는 중입니다: " + data.error);
                    return;
                }

                function updatePriceInfo(priceId, changeId, chartData) {
                    if (!chartData || chartData.length < 2) return;
                    const latest = chartData[chartData.length - 1];   
                    const previous = chartData[chartData.length - 2]; 
                    
                    const currentPrice = latest.close;
                    const change = currentPrice - previous.close;
                    const changePercent = (change / previous.close) * 100;
                    
                    const priceEl = document.getElementById(priceId);
                    const changeEl = document.getElementById(changeId);
                    
                    priceEl.innerText = currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    const formattedChange = Math.abs(change).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    const formattedPercent = changePercent.toFixed(2);
                    
                    if (change > 0) {
                        changeEl.innerText = `▲ ${formattedChange} (+${formattedPercent}%)`;
                        changeEl.className = "price-change up";
                    } else if (change < 0) {
                        changeEl.innerText = `▼ ${formattedChange} (${formattedPercent}%)`;
                        changeEl.className = "price-change down";
                    } else {
                        changeEl.innerText = `0.00 (0.00%)`;
                        changeEl.className = "price-change steady";
                    }
                }

                function drawChart(canvasId, loadingId, chartData, lineColor, fillColor) {
                    document.getElementById(loadingId).style.display = 'none';
                    const ctx = document.getElementById(canvasId).getContext('2d');

                    if (chartInstances[canvasId]) {
                        chartInstances[canvasId].data.labels = chartData.map(d => d.date);
                        chartInstances[canvasId].data.datasets[0].data = chartData.map(d => d.close);
                        chartInstances[canvasId].update('none'); 
                    } else {
                        chartInstances[canvasId] = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: chartData.map(d => d.date), 
                                datasets: [{
                                    data: chartData.map(d => d.close), 
                                    borderColor: lineColor,
                                    backgroundColor: fillColor,
                                    borderWidth: 2,
                                    fill: true,
                                    pointRadius: 0, 
                                    tension: 0.1 
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { x: { display: false }, y: { display: true, position: 'right', grid: { color: '#f0f0f0' } } },
                                interaction: { intersect: false, mode: 'index' }
                            }
                        });
                    }
                }

                drawChart('chart-usdkrw', 'load-usdkrw', data.usdkrw, '#2962FF', 'rgba(41, 98, 255, 0.1)');
                updatePriceInfo('price-usdkrw', 'change-usdkrw', data.usdkrw);
                drawChart('chart-us10y', 'load-us10y', data.us10y, '#FF9800', 'rgba(255, 152, 0, 0.1)');
                updatePriceInfo('price-us10y', 'change-us10y', data.us10y);
                drawChart('chart-wti', 'load-wti', data.wti, '#00897B', 'rgba(0, 137, 123, 0.1)');
                updatePriceInfo('price-wti', 'change-wti', data.wti);
                drawChart('chart-ndx', 'load-ndx', data.ndx, '#D81B60', 'rgba(216, 27, 96, 0.1)');
                updatePriceInfo('price-ndx', 'change-ndx', data.ndx);
                drawChart('chart-kospi', 'load-kospi', data.kospi, '#8E24AA', 'rgba(142, 36, 170, 0.1)');
                updatePriceInfo('price-kospi', 'change-kospi', data.kospi);
                drawChart('chart-vix', 'load-vix', data.vix, '#E53935', 'rgba(229, 57, 53, 0.1)');
                updatePriceInfo('price-vix', 'change-vix', data.vix);

            } catch (error) {
                console.error("대시보드 데이터 로딩 실패:", error);
            }
        }

        window.onload = () => {
            // [수정] 사용자가 웹페이지를 처음 접속하거나 F5 새로고침을 했을 때는 강제 일괄 수집(true)을 지시합니다.
            fetchAndRenderCharts(true); 
            
            // 백그라운드에서는 기존처럼 1분마다 파이썬 봇이 저장해둔 캐시 데이터만 가볍게 긁어옵니다.
            setInterval(() => fetchAndRenderCharts(false), 60000); 
        };
    </script>
</body>
</html>
